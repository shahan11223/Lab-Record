<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK-OS TITAN ERP | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Poppins:wght@300;400;600&display=swap');
        :root { --p: #00f2ff; --bg: #020205; --card: #0d0d15; --border: rgba(255,255,255,0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Poppins', sans-serif; display: grid; grid-template-columns: 240px 1fr; height: 100vh; }
        
        .sidebar { background: #050508; border-right: 1px solid var(--border); padding: 25px; }
        .nav-item { padding: 12px; margin-bottom: 8px; cursor: pointer; color: #666; transition: 0.3s; border-radius: 10px; }
        .nav-item.active { background: rgba(0, 242, 255, 0.1); color: var(--p); border-left: 4px solid var(--p); }
        
        .main { padding: 40px; overflow-y: auto; }
        .glass { background: var(--card); border-radius: 20px; border: 1px solid var(--border); padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        .btn { background: var(--p); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { text-align: left; color: var(--p); padding: 15px; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); color: #ccc; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .modal-content { background:var(--card); padding:30px; border-radius:24px; width:400px; border:1px solid var(--p); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #151520; border: 1px solid var(--border); color: #fff; border-radius: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h1 style="font-family:'Orbitron'; color:var(--p); font-size:20px; margin-bottom:40px;">SK-OS TITAN</h1>
        <div class="nav-item active"><i class="fas fa-users"></i> Staff Registry</div>
        <div class="nav-item" onclick="location.href='index.html'"><i class="fas fa-power-off"></i> Logout</div>
    </aside>

    <main class="main">
        <div class="glass">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Staff Records</h3>
                <button class="btn" onclick="openM()">+ New Entry</button>
            </div>
            <table>
                <thead><tr><th>Name</th><th>Role</th><th>Passkey</th><th>Action</th></tr></thead>
                <tbody id="staff-body"></tbody>
            </table>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--p); margin-bottom:20px;">Add Staff</h2>
            <input id="f_name" placeholder="Full Name">
            <select id="f_role"><option>Admin</option><option>Staff</option></select>
            <input id="f_pass" placeholder="Set Passkey">
            <button class="btn" style="width:100%" onclick="saveStaff()">Register & Save</button>
            <p onclick="closeM()" style="text-align:center; margin-top:15px; cursor:pointer; font-size:12px; color:#666;">Close</p>
        </div>
    </div>

    <script>
        // Fix: Load data and ensure key matches Login page
        let staffList = JSON.parse(localStorage.getItem('erp_staff_v27')) || [];

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function saveStaff() {
            const n = document.getElementById('f_name').value.trim();
            const r = document.getElementById('f_role').value;
            const p = document.getElementById('f_pass').value.trim();

            if(n && p) {
                staffList.push({ n, r, p });
                // Fix: Permanent Storage
                localStorage.setItem('erp_staff_v27', JSON.stringify(staffList));
                render();
                closeM();
                alert("Staff Saved! Refresh the page to test.");
            }
        }

        function render() {
            document.getElementById('staff-body').innerHTML = staffList.map((s, i) => `
                <tr>
                    <td><b>${s.n}</b></td>
                    <td>${s.r}</td>
                    <td><code>${s.p}</code></td>
                    <td><i class="fas fa-trash" onclick="del(${i})" style="color:red; cursor:pointer"></i></td>
                </tr>
            `).join('');
        }

        function del(i) {
            staffList.splice(i, 1);
            localStorage.setItem('erp_staff_v27', JSON.stringify(staffList));
            render();
        }

        render();
    </script>
</body>
</html>
